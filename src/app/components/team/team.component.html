<section class="team-section">
  @if (players.length > 0) {
    <div class="drivers-grid">
      @for (player of players; track player.id) {
        <app-driver-card [driver]="player" (cardClicked)="openModal($event)"></app-driver-card>
      }
    </div>
  } @else {
    <div class="no-results">
      <div class="no-results-icon">🏎️</div>
      <h2>No se encontraron pilotos</h2>
      <p>Intenta con otro nombre de piloto</p>
    </div>
  }
</section>

@if (selectedDriver) {
  <app-driver-modal
    [driver]="selectedDriver"
    (closeModal)="closeModal()"
  ></app-driver-modal>
}
